services:
  plainnvr:
    image: ghcr.io/endless1233214/plainnvr:latest
    pull_policy: always
    container_name: plainnvr
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: America/Detroit
      NVR_PORT: "8080"
      NVR_DATA_DIR: /data
      NVR_RECORDINGS_DIR: /recordings
      NVR_DEFAULT_SEGMENT_SECONDS: "60"
    volumes:
      - /mnt/Apps/plainnvr/data:/data
      - /mnt/Apps/plainnvr/recordings:/recordings
