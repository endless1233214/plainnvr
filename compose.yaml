services:
  plainnvr:
    build: .
    container_name: plainnvr
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: America/Detroit
      NVR_PORT: "8080"
      NVR_DATA_DIR: /data
      NVR_RECORDINGS_DIR: /recordings
      NVR_DEFAULT_SEGMENT_SECONDS: "60"
    volumes:
      - ./data:/data
      - ./recordings:/recordings
